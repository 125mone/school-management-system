<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دخول الوزارة</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.2);
width:350px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#0066cc;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#004a99;
}

</style>

</head>

<body>

<div class="box">

<h2>🏛️ وزارة التربية والتعليم</h2>

<input type="text" placeholder="اسم المستخدم">

<input type="password" placeholder="كلمة المرور">

<button>تسجيل الدخول</button>

</div>

</body>

</html>
