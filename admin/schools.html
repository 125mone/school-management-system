<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>إدارة المدارس</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5f5f5;
}
.container{
    margin-top:40px;
}
</style>

</head>

<body>

<div class="container">

<h2 class="mb-4">🏫 إدارة المدارس</h2>

<button class="btn btn-success mb-3" onclick="addSchool()">
➕ إضافة مدرسة
</button>

<table class="table table-bordered table-striped">

<thead>

<tr>
<th>الكود</th>
<th>اسم المدرسة</th>
<th>المحافظة</th>
<th>مدير المدرسة</th>
<th>الحالة</th>
</tr>

</thead>

<tbody id="schoolsTable">

</tbody>

</table>

</div>

<script>

function addSchool(){

let code=prompt("كود المدرسة");

if(!code)return;

let name=prompt("اسم المدرسة");

if(!name)return;

let city=prompt("المحافظة");

if(!city)return;

let manager=prompt("اسم المدير");

if(!manager)return;

document.getElementById("schoolsTable").innerHTML+=`

<tr>

<td>${code}</td>

<td>${name}</td>

<td>${city}</td>

<td>${manager}</td>

<td>نشطة</td>

</tr>

`;

}

</script>

</body>
</html>
