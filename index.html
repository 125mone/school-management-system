<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة المدارس</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">

        <h1>🏫 نظام إدارة المدارس</h1>
        <p>الإصدار 1.0</p>

        <button onclick="window.location.href='login-ministry.html'">
        🏛️ دخول الوزارة
        </button>
        <button id="school">🏫 دخول المدرسة</button>
        <button id="student">🎓 دخول الطالب</button>
        <button id="result">📄 الاستعلام عن النتيجة</button>
        <button id="top">🏆 الأوائل</button>

    </div>

    <script>
document.addEventListener("click", function(e) {

    if (e.target.id === "ministry") {
        alert("دخول الوزارة قريباً");
    }

    if (e.target.id === "school") {
        alert("دخول المدرسة قريباً");
    }

    if (e.target.id === "student") {
        alert("دخول الطالب قريباً");
    }

    if (e.target.id === "result") {
        alert("النتائج قريباً");
    }

    if (e.target.id === "top") {
        alert("الأوائل قريباً");
    }

});
</script>

</body>

</html>
